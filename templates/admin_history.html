{% extends "base.html" %}

{% block content %}

<h2>Transaction History</h2>

<table class="table">

<tr>
<th>User</th>
<th>Book</th>
<th>Issued</th>
<th>Returned</th>
<th>Pending</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
