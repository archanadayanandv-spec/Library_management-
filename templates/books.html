{% extends "base.html" %}

{% block content %}

<h2>All Books</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Author</th>
    <th>Quantity</th>
</tr>

{% for b in data %}
<tr>
    <td>{{ b[0] }}</td>
    <td>{{ b[1] }}</td>
    <td>{{ b[2] }}</td>
    <td>{{ b[3] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
